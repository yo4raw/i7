name: Fetch new card images

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch new card images (full + thumbnail)
        id: fetch
        shell: bash
        run: |
          mkdir -p public/assets/cards public/assets/th_cards

          EXISTING_CARDS=$(ls public/assets/cards/*.png 2>/dev/null \
            | xargs -n1 basename \
            | sed 's/\.png$//' \
            | grep -E '^[0-9]+$' \
            | sort -n || true)

          EXISTING_TH=$(ls public/assets/th_cards/*.png 2>/dev/null \
            | xargs -n1 basename \
            | sed 's/\.png$//' \
            | grep -E '^[0-9]+$' \
            | sort -n || true)

          # Union of IDs present in either directory
          EXISTING_UNION=$(printf '%s\n%s' "$EXISTING_CARDS" "$EXISTING_TH" | grep -E '^[0-9]+$' | sort -un)

          MIN_ID=$(echo "$EXISTING_UNION" | head -1)
          MAX_ID=$(echo "$EXISTING_UNION" | tail -1)
          CARDS_COUNT=$(echo "$EXISTING_CARDS" | grep -c -E '^[0-9]+$' || true)
          TH_COUNT=$(echo "$EXISTING_TH" | grep -c -E '^[0-9]+$' || true)
          echo "Cards: $CARDS_COUNT, Thumbnails: $TH_COUNT"
          echo "Union range: $MIN_ID ~ $MAX_ID"

          # 1. Forward scan (highest priority: max+1 ~ max+500)
          SCAN_IDS=$(seq $((MAX_ID + 1)) $((MAX_ID + 500)))

          # 2. Gap fill: any ID in [MIN, MAX] where either full or thumbnail is missing
          #    = (full range) - (IDs that have BOTH full and thumbnail)
          COMPLETE_IDS=$(comm -12 <(echo "$EXISTING_CARDS" | sort) <(echo "$EXISTING_TH" | sort))
          FULL_RANGE=$(seq $MIN_ID $MAX_ID)
          GAP_IDS=$(comm -23 <(echo "$FULL_RANGE" | sort) <(echo "$COMPLETE_IDS" | sort) | sort -rn)

          GAP_COUNT=$(echo "$GAP_IDS" | grep -c -E '^[0-9]+$' || true)
          echo "Incomplete IDs in existing range: $GAP_COUNT"

          # 3. Combine: gap IDs first (heal existing dataset), then forward scan (deduplicated)
          MISSING_IDS=$(printf '%s\n%s' "$GAP_IDS" "$SCAN_IDS" | awk 'NF && !seen[$0]++')

          MISSING_COUNT=$(echo "$MISSING_IDS" | grep -c -E '^[0-9]+$' || true)
          echo "IDs to process (total): $MISSING_COUNT"

          # Limit batch size to 1500 IDs per run (full + thumbnail per ID, gap fill + forward scan)
          BATCH_LIMIT=1500
          if [ "$MISSING_COUNT" -gt "$BATCH_LIMIT" ]; then
            MISSING_IDS=$(echo "$MISSING_IDS" | grep -E '^[0-9]+$')
            MISSING_IDS=$(echo "$MISSING_IDS" | head -n "$BATCH_LIMIT")
            MISSING_COUNT=$BATCH_LIMIT
            echo "Batch limited to: $BATCH_LIMIT"
          fi
          echo "IDs to process (this run): $MISSING_COUNT"

          if [ "$MISSING_COUNT" -eq 0 ]; then
            echo "downloaded_full=0" >> "$GITHUB_OUTPUT"
            echo "downloaded_th=0" >> "$GITHUB_OUTPUT"
            echo "downloaded_total=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          fetch_card_pair() {
            local ID=$1
            local FETCHED=""

            if [ ! -f "public/assets/cards/${ID}.png" ]; then
              local URL="https://i7.step-on-dream.net/img/cards/${ID}.png"
              local DEST="public/assets/cards/${ID}.png"
              local HTTP_CODE
              HTTP_CODE=$(curl -s -o "$DEST" -w "%{http_code}" --connect-timeout 10 --max-time 30 "$URL" || true)
              HTTP_CODE=${HTTP_CODE:-000}
              if [ "$HTTP_CODE" = "200" ] && [ "$(file --brief --mime-type "$DEST")" = "image/png" ]; then
                FETCHED="${FETCHED}F"
              else
                rm -f "$DEST"
              fi
            fi

            if [ ! -f "public/assets/th_cards/${ID}.png" ]; then
              local URL="https://i7.step-on-dream.net/img/cards/th/${ID}.png"
              local DEST="public/assets/th_cards/${ID}.png"
              local HTTP_CODE
              HTTP_CODE=$(curl -s -o "$DEST" -w "%{http_code}" --connect-timeout 10 --max-time 30 "$URL" || true)
              HTTP_CODE=${HTTP_CODE:-000}
              if [ "$HTTP_CODE" = "200" ] && [ "$(file --brief --mime-type "$DEST")" = "image/png" ]; then
                FETCHED="${FETCHED}T"
              else
                rm -f "$DEST"
              fi
            fi

            if [ -n "$FETCHED" ]; then
              echo "OK:${ID}:${FETCHED}"
            fi
          }
          export -f fetch_card_pair

          RESULTS=$(echo "$MISSING_IDS" | grep -E '^[0-9]+$' \
            | xargs -P 10 -I {} bash -c 'fetch_card_pair "$@"' _ {} || true)

          DOWNLOADED_FULL=$(echo "$RESULTS" | grep -c "^OK:[0-9]*:.*F" || true)
          DOWNLOADED_TH=$(echo "$RESULTS" | grep -c "^OK:[0-9]*:.*T" || true)
          DOWNLOADED_TOTAL=$(echo "$RESULTS" | grep -c "^OK:" || true)
          NEW_IDS=$(echo "$RESULTS" | grep "^OK:" | awk -F: '{print $2}' | sort -n | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g' || true)

          echo "Full-size downloaded: $DOWNLOADED_FULL"
          echo "Thumbnails downloaded: $DOWNLOADED_TH"
          echo "Unique IDs updated: $DOWNLOADED_TOTAL"
          echo "downloaded_full=$DOWNLOADED_FULL" >> "$GITHUB_OUTPUT"
          echo "downloaded_th=$DOWNLOADED_TH" >> "$GITHUB_OUTPUT"
          echo "downloaded_total=$DOWNLOADED_TOTAL" >> "$GITHUB_OUTPUT"
          echo "max_id=$MAX_ID" >> "$GITHUB_OUTPUT"
          echo "new_end=$((MAX_ID + 500))" >> "$GITHUB_OUTPUT"
          echo "gap_count=$GAP_COUNT" >> "$GITHUB_OUTPUT"
          echo "new_ids=${NEW_IDS}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: cpr
        if: steps.fetch.outputs.downloaded_total != '0'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            public/assets/cards/
            public/assets/th_cards/
          commit-message: "Add card images: ${{ steps.fetch.outputs.new_ids }}"
          branch: auto/add-cards-${{ github.run_id }}
          delete-branch: true
          title: "Add card image(s): ${{ steps.fetch.outputs.downloaded_full }} full + ${{ steps.fetch.outputs.downloaded_th }} thumbnail"
          body: |
            ## Summary
            Automatically fetched new card images (full-size and thumbnails) from the source server.

            - **Previous max ID**: ${{ steps.fetch.outputs.max_id }}
            - **Scanned range**: ${{ steps.fetch.outputs.max_id }}+1 ~ ${{ steps.fetch.outputs.new_end }}
            - **Incomplete IDs checked**: ${{ steps.fetch.outputs.gap_count }}
            - **Full-size downloaded**: ${{ steps.fetch.outputs.downloaded_full }}
            - **Thumbnails downloaded**: ${{ steps.fetch.outputs.downloaded_th }}
            - **Unique IDs updated**: ${{ steps.fetch.outputs.downloaded_total }}
            - **New IDs**: ${{ steps.fetch.outputs.new_ids }}

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --delete-branch

      - name: Bump tag and trigger release/deploy
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -e -o pipefail
          git fetch --tags origin
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Latest: $LATEST  ->  New: $NEW_TAG"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          # actions/checkout が永続化した GITHUB_TOKEN の認証ヘッダを除去し、RELEASE_PAT で push する。
          # （GITHUB_TOKEN 由来の push は deploy.yml をトリガーしないため、PAT を確実に使わせる）
          git config --local --unset-all http."https://github.com/".extraheader 2>/dev/null || true
          git fetch origin main
          git tag "$NEW_TAG" origin/main
          git push origin "$NEW_TAG"
