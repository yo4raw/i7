name: Create Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
