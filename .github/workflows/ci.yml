name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'public/assets/cards/**'
      - 'public/assets/th_cards/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
