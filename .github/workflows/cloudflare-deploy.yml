name: Deploy to Cloudflare Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: cloudflare
    steps:
      - name: Resolve ref
        id: resolve-ref
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort=-v:refname "${{ github.server_url }}/${{ github.repository }}" 'v*' | head -1 | sed 's/.*refs\/tags\///')
          if [ -z "$LATEST_TAG" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve-ref.outputs.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=i7-gottani --branch=main
